async function callAI(messages){
  const ai={...AI_PROVIDERS.anthropic,...getAICfg()};
  const key=ai.apiKey||"";
  if(!key)throw new Error("Configura tu API key en ⚙ Configuración → 🤖 IA");
  const provider=ai.provider||"anthropic";
  const url=ai.url||AI_PROVIDERS[provider]?.url||ai.url;
  const model=ai.model||AI_PROVIDERS[provider]?.model||"";
  const userMsg=messages.find(m=>m.role==="user")?.content||"";

  // Anthropic format
  if(provider==="anthropic"){
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model,max_tokens:1000,messages})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`Error ${r.status}`);}
    return(await r.json()).content?.[0]?.text||"";
  }
  // Gemini format
  if(provider==="gemini"){
    const gemUrl=`${url}?key=${key}`;
    const r=await fetch(gemUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:userMsg}]}]})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`Error ${r.status}`);}
    return(await r.json()).candidates?.[0]?.content?.parts?.[0]?.text||"";
  }
  // OpenAI-compatible (OpenAI, OpenRouter, custom)
  const headers={"Content-Type":"application/json","Authorization":`Bearer ${key}`};
  if(provider==="openrouter"){headers["HTTP-Referer"]="https://rotulado.app";headers["X-Title"]="Rotulado";}
  const r=await fetch(url,{method:"POST",headers,body:JSON.stringify({model,max_tokens:1000,messages:[{role:"user",content:userMsg}]})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`Error ${r.status}`);}
  return(await r.json()).choices?.[0]?.message?.content||"";
}

// ── Exportar formato Shalom ──
const normShalom=t=>String(t).toUpperCase().normalize("NFD").replace(/\p{Mn}/gu,"");
function buscarDestinoShalom(raw){
  if(!raw)return"";
  const n=normShalom(raw);
  const normed=DESTINOS_SHALOM.map(d=>normShalom(d));
  const exact=normed.indexOf(n);
  if(exact!==-1)return DESTINOS_SHALOM[exact];
  const contains=normed.findIndex(d=>d===n||d.includes(n)||n.includes(d));
  if(contains!==-1)return DESTINOS_SHALOM[contains];
  const words=n.split(/\s+/).filter(w=>w.length>2);
  let bestScore=0,bestIdx=-1;
  normed.forEach((d,i)=>{const s=words.filter(w=>d.includes(w)).length;if(s>bestScore){bestScore=s;bestIdx=i;}});
  if(bestIdx!==-1&&bestScore>0)return DESTINOS_SHALOM[bestIdx];
  return raw.toUpperCase();
}
function detectarMercaderia(nombre,products){
  const n=normShalom(nombre||"");
  if(products&&products.length){
    const match=products.find(p=>normShalom(p.nombre)===n);
    if(match)return match.mercaderia;
  }
  if(["RODILL","MUNEQUERA","TOBILLER","SOPORTE"].some(k=>n.includes(k)))return"PAQUETE XS";
  if(["REFLECTIV","TELA"].some(k=>n.includes(k)))return"PAQUETE S";
  return"PAQUETE XS";
}
function exportarFormatoShalom(orders,products){
  if(!orders||orders.length===0){alert("No hay pedidos para exportar.");return;}
  const headers=["DESTINATARIO (DOC)","TELF. DESTINATARIO","CONTACTO (DOC)","TELF. CONTACTO","NRO GRR","ORIGEN","DESTINO","MERCADERIA","ALTO","ANCHO","LARGO","PESO","CANTIDAD"];
  const filas=orders.map(o=>{
    let tel=String(o.celular||"").replace(/\D/g,"");
    if(tel.startsWith("51")&&tel.length===11)tel=tel.slice(2);
    tel=tel.slice(-9);
    return[
      o.dni||"",tel,"","","","PUNTA HERMOSA",
      buscarDestinoShalom(o.agencia||o.destino||""),
      detectarMercaderia(o.producto||"",products),
      0.1,0.1,0.1,1,Number(o.cantidad)||1
    ];
  });
  const ws=XLSX.utils.aoa_to_sheet([headers,...filas]);
  ws["!cols"]=[20,18,15,15,10,18,25,12,8,8,8,8,10].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Hoja1");
  XLSX.writeFile(wb,"formato_shalom.xlsx");
}

function exportarFormatoSunat(orders){
  const confirmados=orders.filter(o=>Number(o.precio||0)>0);
  if(confirmados.length===0){alert("No hay pedidos confirmados (con precio > 0) para exportar.");return;}
  const headers=["NOMBRE","DNI","PRODUCTO","MONTO TOTAL","MONTO SIN IGV (÷1.18)","IGV (18%)"];
  const filas=confirmados.map(o=>{
    const total=Number(o.precio||0);
    const sinIgv=total/1.18;
    const igv=total-sinIgv;
    return[o.nombres||"",o.dni||"",o.producto||"",Number(total.toFixed(2)),Number(sinIgv.toFixed(2)),Number(igv.toFixed(2))];
  });
  const totalGeneral=confirmados.reduce((s,o)=>s+Number(o.precio||0),0);
  const sinIgvGeneral=totalGeneral/1.18;
  filas.push(["","","TOTAL",Number(totalGeneral.toFixed(2)),Number(sinIgvGeneral.toFixed(2)),Number((totalGeneral-sinIgvGeneral).toFixed(2))]);
  const ws=XLSX.utils.aoa_to_sheet([headers,...filas]);
  ws["!cols"]=[{wch:32},{wch:14},{wch:28},{wch:16},{wch:20},{wch:14}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"SUNAT");
  const fecha=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`sunat_${fecha}.xlsx`);
}

async function pushOrder(order,cfg){
  const payload={...order,created_at:new Date().toISOString(),brand:cfg.brand};
  const results={db:null,webhook:null};
  if(cfg.dbConnected&&cfg.dbUrl){try{const h={"Content-Type":"application/json"};if(cfg.dbToken)h["Authorization"]=`Bearer ${cfg.dbToken}`;const r=await fetch(cfg.dbUrl,{method:"POST",headers:h,body:JSON.stringify(payload)});results.db=r.ok?"ok":`error_${r.status}`;}catch{results.db="error_network";}}
  if(cfg.webhookEnabled&&cfg.webhookUrl){try{const r=await fetch(cfg.webhookUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});results.webhook=r.ok?"ok":`error_${r.status}`;}catch{results.webhook="error_network";}}
  return results;
}

const DEFAULT_SYNC={url:"",key:"",table:"pedidos",enabled:false};
const cloudH=c=>({"apikey":c.key,"Authorization":`Bearer ${c.key}`,"Content-Type":"application/json"});
async function cloudPull(c){
  const r=await fetch(`${c.url}/rest/v1/${c.table||"pedidos"}?order=id.asc`,{headers:cloudH(c)});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  return r.json();
}
const BASE_COLS=["id","nombres","destino","agencia","celular","dni","producto","created_at","brand","cantidad"];
const stripToBase=o=>{const out={};BASE_COLS.forEach(k=>{if(o[k]!==undefined)out[k]=o[k];});return out;};
async function cloudUpsert(c,o){
  let r=await fetch(`${c.url}/rest/v1/${c.table||"pedidos"}`,{method:"POST",headers:{...cloudH(c),"Prefer":"resolution=merge-duplicates"},body:JSON.stringify(o)});
  if(!r.ok){
    const txt=await r.text().catch(()=>"");
    // Fallback: si el error es por columna desconocida (PGRST204), reintenta con columnas base
    if(r.status===400&&/PGRST204|column|schema cache/i.test(txt)){
      const base=stripToBase(o);
      r=await fetch(`${c.url}/rest/v1/${c.table||"pedidos"}`,{method:"POST",headers:{...cloudH(c),"Prefer":"resolution=merge-duplicates"},body:JSON.stringify(base)});
      if(r.ok){const e=new Error("SCHEMA_FALLBACK");e.fallback=true;throw e;}
      const txt2=await r.text().catch(()=>"");
      throw new Error(`HTTP ${r.status}: ${txt2.slice(0,200)}`);
    }
    throw new Error(`HTTP ${r.status}: ${txt.slice(0,200)}`);
  }
}
async function cloudDelete(c,id){
  const r=await fetch(`${c.url}/rest/v1/${c.table||"pedidos"}?id=eq.${id}`,{method:"DELETE",headers:cloudH(c)});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
}

const Spin=()=><span style={{display:"inline-block",animation:"spin .7s linear infinite",marginRight:5}}>⟳</span>;

function AcInput({value,onChange,placeholder,suggestions=AGENCIES,deptFilter=false}){
  const[open,setOpen]=useState(false);
  const[filt,setFilt]=useState([]);
  const[dept,setDept]=useState(()=>deptFilter&&value?deptOf(value)||"":"");
  const[hiIdx,setHiIdx]=useState(-1);
  const wr=useRef(null);
  const baseList=useMemo(()=>{
    if(!deptFilter||!dept)return suggestions;
    return suggestions.filter(s=>deptOf(s)===dept);
  },[suggestions,deptFilter,dept]);
  const buildFilt=v=>{
    const q=v.trim();
    if(q.length>0)return baseList.filter(s=>s.toLowerCase().includes(q.toLowerCase())).slice(0,8);
    return baseList.slice(0,8);
  };
  const pick=(s,d)=>{onChange(s);if(deptFilter&&d&&!dept)setDept(d);setOpen(false);setHiIdx(-1);};
  const handle=v=>{onChange(v);const f=buildFilt(v);setFilt(f);setOpen(true);setHiIdx(-1);};
  const handleDept=d=>{
    setDept(d);setHiIdx(-1);
    const f=d?suggestions.filter(s=>deptOf(s)===d).filter(s=>!value||s.toLowerCase().includes(value.trim().toLowerCase())).slice(0,8):buildFilt(value);
    setFilt(f);setOpen(true);
  };
  const handleKey=e=>{
    if(e.key==="ArrowDown"){e.preventDefault();setHiIdx(i=>Math.min(i+1,filt.length-1));return;}
    if(e.key==="ArrowUp"){e.preventDefault();setHiIdx(i=>Math.max(i-1,0));return;}
    if(e.key==="Enter"){
      e.preventDefault();e.stopPropagation();
      if(open&&filt.length>0){const idx=hiIdx>=0?hiIdx:0;const s=filt[idx];pick(s,deptOf(s));}
      return;
    }
    if(e.key==="Escape"){e.preventDefault();setOpen(false);setHiIdx(-1);}
  };
  useEffect(()=>{const fn=e=>{if(wr.current&&!wr.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",fn);return()=>document.removeEventListener("mousedown",fn);},[]);
  return(<div ref={wr} style={{position:"relative"}}>
    {deftFilterRow(deptFilter,dept,handleDept,baseList.length,suggestions.length)}
    <input value={value} onChange={e=>handle(e.target.value)} onKeyDown={handleKey} placeholder={placeholder} onFocus={()=>{const f=buildFilt(value);setFilt(f);setOpen(true);}} style={{width:"100%",padding:"9px 11px",border:"1.5px solid #ccc",borderRadius:8,fontSize:14,background:"#fff",color:"#1a1a1a",boxSizing:"border-box"}}/>
    {open&&filt.length>0&&<div style={{position:"absolute",top:"calc(100% + 3px)",left:0,right:0,zIndex:400,background:"#fff",border:"1.5px solid #ccc",borderRadius:8,maxHeight:240,overflowY:"auto",boxShadow:"0 6px 20px rgba(0,0,0,.15)"}}>
      {filt.map((s,i)=>{const v=value||"";const q=v.trim();const idx=q?s.toLowerCase().indexOf(q.toLowerCase()):-1;const d=deptFilter?deptOf(s):"";const hi=i===hiIdx;return(<div key={i} onMouseDown={e=>{e.preventDefault();pick(s,d);}} style={{padding:"8px 12px",fontSize:13,cursor:"pointer",color:"#1a1a1a",borderBottom:i<filt.length-1?"1px solid #f0f0f0":"none",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,background:hi?"#f5f0eb":"#fff"}} onMouseEnter={()=>setHiIdx(i)} onMouseLeave={()=>setHiIdx(-1)}>
        <span style={{flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{idx>=0?<>{s.slice(0,idx)}<strong style={{color:"#c0532a"}}>{s.slice(idx,idx+q.length)}</strong>{s.slice(idx+q.length)}</>:s}</span>
        {d&&<span style={{fontSize:10,color:"#9a8070",fontFamily:"monospace",flexShrink:0}}>{d}</span>}
      </div>);})}
    </div>}
  </div>);
}

function deftFilterRow(enabled,dept,setDept,count,total){

  const handleLogoUpload=async f=>{if(!f)return;setUploading(true);try{const d=await f2url(f);const n=f.name.replace(/\.[^.]+$/,"");const nl={id:Date.now(),name:n,dataUrl:d};const u=[...logos,nl];setLogos(u);persist(SK.logos,u);set("activeLogo",nl.id);}catch{}finally{setUploading(false);};};
  const delLogo=id=>{const u=logos.filter(l=>l.id!==id);setLogos(u);persist(SK.logos,u);if(cfg.activeLogo===id)set("activeLogo",null);};

  const testDb=async()=>{setDbTesting(true);setDbMsg("");try{if(!cfg.dbUrl.trim()){setDbMsg("❌ Ingresa la URL.");setDbTesting(false);return;}const h={"Content-Type":"application/json"};if(cfg.dbToken)h["Authorization"]=`Bearer ${cfg.dbToken}`;let ok=false;for(const ep of [cfg.dbUrl,cfg.dbUrl.replace(/\/$/,"")+"/pedidos"]){try{const r=await fetch(ep,{method:"GET",headers:h});if(r.status<500){ok=true;setCfg(p=>({...p,dbConnected:true}));setDbMsg(`✅ Conexión OK (${r.status})`);break;}}catch{}}if(!ok){setCfg(p=>({...p,dbConnected:false}));setDbMsg("⚠️ No se pudo conectar.");}}catch(e){setDbMsg("❌ "+e.message);setCfg(p=>({...p,dbConnected:false}));}setDbTesting(false);};

  const TABS=[["marca","🏷 Marca"],["visual","🎨 Visual"],["logos","🖼 Logos"],["ai","🤖 IA"],["db","🗄 DB"],["webhook","⚡ Webhook"],["productos","📦 Productos"],["estados","👁 Estados"],["sync","☁️ Sync"]];
  const Slider=({label,k,min,max,unit=""})=>(<div style={{display:"flex",flexDirection:"column",gap:5}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,fontWeight:600,color:"#5a4a3a"}}>{label}</span><span style={{fontSize:12,fontFamily:"monospace",color:"#9a8070"}}>{cfg[k]}{unit}</span></div><input type="range" min={min} max={max} value={cfg[k]} onChange={e=>set(k,Number(e.target.value))} style={{width:"100%",accentColor:"#c0532a"}}/></div>);
  const ColorRow=({label,k})=>(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}><span style={{fontSize:13,fontWeight:600,color:"#5a4a3a"}}>{label}</span><div style={{display:"flex",alignItems:"center",gap:6}}><input type="color" value={cfg[k]} onChange={e=>set(k,e.target.value)} style={{width:34,height:30,borderRadius:6,padding:0,border:"1.5px solid #bbb",cursor:"pointer"}}/><span style={{fontSize:11,fontFamily:"monospace",color:"#9a8070"}}>{cfg[k]}</span></div></div>);
  const Toggle=({label,k,desc})=>(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 11px",border:"1px solid #e0d8cc",borderRadius:8,background:"#fff",gap:10}}><div><div style={{fontSize:14,fontWeight:600,color:"#3a2a1a"}}>{label}</div>{desc&&<div style={{fontSize:12,color:"#9a8070",marginTop:2}}>{desc}</div>}</div><div onClick={()=>set(k,!cfg[k])} style={{width:34,height:20,borderRadius:999,background:cfg[k]?"#1c1a17":"#d4cfc4",position:"relative",cursor:"pointer",transition:".14s",flexShrink:0}}><div style={{position:"absolute",top:3,left:cfg[k]?17:3,width:14,height:14,borderRadius:"50%",background:"#fff",transition:".14s",boxShadow:"0 1px 2px #0003"}}/></div></div>);
  const inp=(k,ph,type="text")=><input type={type} value={cfg[k]} onChange={e=>set(k,e.target.value)} placeholder={ph} style={{width:"100%",padding:"9px 11px",border:"1.5px solid #ccc",borderRadius:8,fontSize:14,background:"#fff",color:"#1a1a1a",boxSizing:"border-box"}}/>;

  return(<div style={{position:"fixed",inset:0,background:"#fdfaf6",display:"flex",flexDirection:"column",zIndex:100}}>
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 18px",borderBottom:"1px solid #e0d8cc",background:"#f5f0e8",flexShrink:0}}>
        <span style={{fontSize:15,fontWeight:700,color:"#3a2a1a"}}>⚙ Configuración</span>
        <button onClick={onClose} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",background:"#fff",border:"1.5px solid #d0c8bc",borderRadius:8,fontSize:13,cursor:"pointer",color:"#5a4a3a",fontWeight:600}}>← Volver</button>
      </div>
      <div style={{display:"flex",borderBottom:"1px solid #e0d8cc",background:"#f5f0e8",flexShrink:0,overflowX:"auto"}}>
        {TABS.map(([id,label])=><button key={id} onClick={()=>setTab(id)} style={{flexShrink:0,padding:"10px 12px",border:"none",borderBottom:`3px solid ${tab===id?"#c0532a":"transparent"}`,background:"transparent",fontSize:11,fontWeight:tab===id?700:500,color:tab===id?"#c0532a":"#7a6a5a",cursor:"pointer",whiteSpace:"nowrap"}}>{label}</button>)}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 18px",maxWidth:640,width:"100%",margin:"0 auto",display:"flex",flexDirection:"column",gap:14}}>

        {tab==="marca"&&<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 72px",gap:10}}>
            <div><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:"#7a6a5a",marginBottom:4}}>Nombre de marca</div>{inp("brand","KLYNEA")}</div>
            <div><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:"#7a6a5a",marginBottom:4}}>Inicial</div><input value={cfg.initial} onChange={e=>set("initial",e.target.value.toUpperCase().slice(0,2))} maxLength={2} style={{width:"100%",padding:"9px 10px",border:"1.5px solid #ccc",borderRadius:8,fontSize:16,fontWeight:700,textAlign:"center",background:"#fff",color:"#1a1a1a",boxSizing:"border-box"}}/></div>
          </div>
          <div><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:"#7a6a5a",marginBottom:8}}>Color de acento</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              {PALETTE.map(h=><div key={h} onClick={()=>set("accent",h)} style={{width:34,height:34,borderRadius:7,background:h,cursor:"pointer",border:cfg.accent===h?"3px solid #1a1a1a":"2px solid transparent",transform:cfg.accent===h?"scale(1.1)":"scale(1)",transition:".12s"}}/>)}
              <input type="color" value={cfg.accent} onChange={e=>set("accent",e.target.value)} style={{width:34,height:34,borderRadius:7,padding:0,border:"1.5px solid #bbb",cursor:"pointer"}}/>
            </div>
          </div>
        </>}

        {tab==="visual"&&<>
          <div><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:"#7a6a5a",marginBottom:8}}>Estilo</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[["classic","Clásico","Bordes oscuros"],["bold","Negrita","Header colorido"],["minimal","Mínimo","Bordes suaves"]].map(([v,n,d])=><div key={v} onClick={()=>set("labelStyle",v)} style={{border:`2px solid ${cfg.labelStyle===v?"#1c1a17":"#d0c8bc"}`,borderRadius:9,padding:"10px 8px",cursor:"pointer",background:cfg.labelStyle===v?"#fff7ef":"#fff",textAlign:"center",transition:".12s"}}>
                <div style={{width:"100%",height:7,borderRadius:2,background:v==="classic"?"#1c1a17":v==="bold"?cfg.accent:"#d0ccc4",marginBottom:6}}/>
                <div style={{fontSize:13,fontWeight:700,color:"#3a2a1a"}}>{n}</div><div style={{fontSize:11,color:"#9a8070",marginTop:2}}>{d}</div>
              </div>)}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><ColorRow label="Cabecera" k="headerBg"/><ColorRow label="Pie" k="footerBg"/><ColorRow label="Cuerpo" k="bodyBg"/></div>
          <Slider label="Tamaño nombre" k="nameFontSize" min={11} max={20} unit="px"/>
          <Slider label="Barra acento" k="accentBarHeight" min={0} max={10} unit="px"/>
          <Slider label="Radio bordes" k="borderRadius" min={0} max={12} unit="px"/>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <Toggle label="Marcas de corte" k="showCutMarks" desc="Líneas guía"/><Toggle label="Código de barras" k="showBarcode" desc="Decorativo"/><Toggle label="Texto Frágil" k="showFragile"/><Toggle label="Contador" k="showCounter" desc="#01/06"/>
          </div>
        </>}

        {tab==="logos"&&<>
          {logos.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {logos.map(logo=><div key={logo.id} onClick={()=>set("activeLogo",cfg.activeLogo===logo.id?null:logo.id)} style={{border:`2px solid ${cfg.activeLogo===logo.id?"#1c1a17":"#d0c8bc"}`,borderRadius:9,padding:"9px 8px 7px",cursor:"pointer",background:cfg.activeLogo===logo.id?"#fff7ef":"#fff",position:"relative",textAlign:"center",transition:".12s"}}>
              {cfg.activeLogo===logo.id&&<div style={{position:"absolute",top:5,right:5,width:18,height:18,borderRadius:"50%",background:"#c0532a",color:"#fff",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>✓</div>}
              <img src={logo.dataUrl} alt={logo.name} style={{height:40,maxWidth:"100%",objectFit:"contain",display:"block",margin:"0 auto 5px"}}/>
              <div style={{fontSize:11,fontWeight:600,color:"#5a4a3a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{logo.name}</div>
              <button onClick={e=>{e.stopPropagation();delLogo(logo.id);}} style={{marginTop:5,padding:"3px 8px",background:"#fef2f2",border:"1px solid #f5b8b8",borderRadius:5,fontSize:11,color:"#9b2020",cursor:"pointer",fontWeight:600}}>Eliminar</button>
            </div>)}
          </div>}
          <div onClick={()=>fileRef.current?.click()} style={{border:"2px dashed #c8b8a8",borderRadius:9,padding:16,textAlign:"center",cursor:"pointer",background:"#faf7f3",fontSize:14,color:"#8a7060"}} onMouseEnter={e=>e.currentTarget.style.borderColor="#c0532a"} onMouseLeave={e=>e.currentTarget.style.borderColor="#c8b8a8"}>
            {uploading?<><Spin/>Subiendo…</>:<><strong style={{color:"#4a3a2a"}}>+ Subir logo</strong> · PNG, JPG, SVG</>}
          </div>
          <input ref={fileRef} type="file" accept="image/*" onChange={e=>{handleLogoUpload(e.target.files?.[0]);e.target.value="";}} style={{display:"none"}}/>
        </>}

        {tab==="ai"&&<>
          {/* Proveedor */}
          <div>
            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:"#7a6a5a",marginBottom:8}}>Proveedor de IA</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {Object.entries(AI_PROVIDERS).map(([k,v])=>(
                <div key={k} onClick={()=>setAi("provider",k)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",border:`2px solid ${aiCfg.provider===k?"#1c1a17":"#d0c8bc"}`,borderRadius:8,cursor:"pointer",background:aiCfg.provider===k?"#fff7ef":"#fff",transition:".12s"}}>
                  <div style={{width:18,height:18,borderRadius:"50%",border:`2px solid ${aiCfg.provider===k?"#c0532a":"#ccc"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {aiCfg.provider===k&&<div style={{width:8,height:8,borderRadius:"50%",background:"#c0532a"}}/>}
                  </div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:"#1c1a17"}}>{v.name}</div>
                    {v.model&&<div style={{fontSize:11,color:"#9a8070",fontFamily:"monospace"}}>{aiCfg.provider===k&&aiCfg.model?aiCfg.model:v.model}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* URL personalizada si es custom */}
          {aiCfg.provider==="custom"&&<div>
            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:"#7a6a5a",marginBottom:4}}>URL del endpoint (OpenAI-compatible)</div>
            <input value={aiCfg.url||""} onChange={e=>setAi("url",e.target.value)} placeholder="https://mi-ollama.com/v1/chat/completions" style={{width:"100%",padding:"9px 11px",border:"1.5px solid #ccc",borderRadius:8,fontSize:13,background:"#fff",color:"#1a1a1a",boxSizing:"border-box",fontFamily:"monospace"}}/>
          </div>}

          {/* Modelo */}
          <div>
            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:"#7a6a5a",marginBottom:4}}>Modelo</div>
            <input value={aiCfg.model||currentProvider.model||""} onChange={e=>setAi("model",e.target.value)} placeholder={currentProvider.model||"nombre-del-modelo"} style={{width:"100%",padding:"9px 11px",border:"1.5px solid #ccc",borderRadius:8,fontSize:13,background:"#fff",color:"#1a1a1a",boxSizing:"border-box",fontFamily:"monospace"}}/>
          </div>

          {/* API Key */}
          <div>
            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:"#7a6a5a",marginBottom:4}}>API Key</div>
            <input type="password" value={aiCfg.apiKey||""} onChange={e=>setAi("apiKey",e.target.value)} placeholder={aiCfg.provider==="anthropic"?"sk-ant-api03-...":aiCfg.provider==="openai"?"sk-...":aiCfg.provider==="openrouter"?"sk-or-v1-...":"tu-api-key"} style={{width:"100%",padding:"9px 11px",border:"1.5px solid #ccc",borderRadius:8,fontSize:14,background:"#fff",color:"#1a1a1a",boxSizing:"border-box",fontFamily:"monospace"}}/>
          </div>

          {/* Probar conexión */}
          {(aiCfg.apiKey||"").length>5&&<div><TestAIBtn/></div>}
          <div style={{padding:"10px 12px",background:"#f0f8ff",borderRadius:8,fontSize:12.5,color:"#1a3a6a",border:"1px solid #b0c8f0",lineHeight:1.7}}>
            {aiCfg.provider==="anthropic"&&<>🔑 Obtén tu key en <strong>console.anthropic.com</strong> → API Keys</>}
            {aiCfg.provider==="openai"&&<>🔑 Obtén tu key en <strong>platform.openai.com</strong> → API Keys</>}
            {aiCfg.provider==="openrouter"&&<>🔑 Obtén tu key en <strong>openrouter.ai/keys</strong> — accede a múltiples modelos con una sola key, incluyendo modelos gratuitos</>}
            {aiCfg.provider==="gemini"&&<>🔑 Obtén tu key en <strong>aistudio.google.com</strong> → Get API Key — tiene tier gratuito</>}
            {aiCfg.provider==="custom"&&<>🔑 Usa la key que requiera tu endpoint (Ollama local no necesita key)</>}
          </div>

          <div style={{borderTop:"1px solid #e0d8cc",paddingTop:14}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:"#7a6a5a",marginBottom:6}}>Prompt de extracción</div>
            <div style={{fontSize:12,color:"#8a7a6a",marginBottom:8,lineHeight:1.5}}>Este es el prompt que se envía a la IA para extraer los datos del pedido. Ajústalo si los resultados no son precisos para tu tipo de texto.</div>
            <textarea value={prompt} onChange={e=>handlePrompt(e.target.value)} style={{width:"100%",minHeight:160,padding:"9px 11px",border:"1.5px solid #ccc",borderRadius:8,fontSize:12,fontFamily:"monospace",lineHeight:1.6,resize:"vertical",background:"#fff",color:"#1a1a1a",boxSizing:"border-box"}}/>
            <button onClick={()=>setPromptState(DEFAULT_PROMPT)} style={{marginTop:6,padding:"6px 12px",background:"#fff",border:"1.5px solid #d0c8bc",borderRadius:7,fontSize:12,cursor:"pointer",color:"#7a6a5a",fontWeight:500}}>
              ↩ Restaurar prompt por defecto
            </button>
          </div>
        </>}

        {tab==="db"&&<>
          <div style={{padding:"10px 12px",background:"#f0f4ff",borderRadius:8,fontSize:13,color:"#1a3a6a",border:"1px solid #b0c8f0",lineHeight:1.6}}>🗄 Compatible con Supabase, Pocketbase, PostgREST o tu Django en Hetzner.</div>
          <div><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:"#7a6a5a",marginBottom:4}}>URL del endpoint</div>{inp("dbUrl","https://tu-api.com/api/pedidos/")}</div>
          <div><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:"#7a6a5a",marginBottom:4}}>Token (opcional)</div>{inp("dbToken","Bearer eyJ…","password")}</div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <button onClick={testDb} disabled={dbTesting} style={{padding:"10px 16px",background:dbTesting?"#ccc":"#1f5a8a",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:dbTesting?"default":"pointer",display:"flex",alignItems:"center",gap:6}}>{dbTesting?<><Spin/>Probando…</>:"🔌 Probar conexión"}</button>
            {cfg.dbConnected&&<span style={{padding:"5px 10px",background:"#f0fdf4",border:"1px solid #86e8ac",borderRadius:8,fontSize:12,color:"#166534",fontWeight:700}}>✓ Conectado</span>}
          </div>
          {dbMsg&&<div style={{padding:"9px 12px",borderRadius:8,fontSize:13,background:dbMsg.startsWith("✅")?"#f0fdf4":"#fef9f0",border:`1px solid ${dbMsg.startsWith("✅")?"#86e8ac":"#f0c050"}`,color:dbMsg.startsWith("✅")?"#166534":"#7a4a00",fontWeight:500}}>{dbMsg}</div>}
        </>}

        {tab==="webhook"&&<>
          <div style={{padding:"10px 12px",background:"#f5f0ff",borderRadius:8,fontSize:13,color:"#3a1a6a",border:"1px solid #c0a0f0",lineHeight:1.6}}>⚡ Se dispara junto con DB al confirmar cada pedido. Compatible con n8n, Make, Zapier.</div>
          <div><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:"#7a6a5a",marginBottom:4}}>URL del Webhook</div>{inp("webhookUrl","https://n8n.tu-servidor.com/webhook/rotulado")}</div>
          <Toggle label="Webhook activo" k="webhookEnabled" desc="Enviar POST al confirmar pedido"/>
        </>}

        {tab==="productos"&&<>
          <div style={{padding:"10px 12px",background:"#fff7ef",borderRadius:8,fontSize:13,color:"#7a4a00",border:"1px solid #e8c880",lineHeight:1.6}}>
            📦 Define tus productos y la categoría Shalom que se usará al exportar el Excel. El nombre exacto se autocompleta al ingresar pedidos.
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {localProducts.map((p,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:8,alignItems:"center",padding:"8px 10px",border:"1.5px solid #e0d8cc",borderRadius:8,background:"#fff"}}>
                <input value={p.nombre} onChange={e=>{const u=[...localProducts];u[i]={...u[i],nombre:e.target.value.toUpperCase()};setLocalProducts(u);}} style={{padding:"6px 8px",border:"1.5px solid #ddd",borderRadius:6,fontSize:13,fontWeight:600,color:"#1c1a17",background:"#faf8f5",boxSizing:"border-box"}}/>
                <select value={p.mercaderia} onChange={e=>{const u=[...localProducts];u[i]={...u[i],mercaderia:e.target.value};setLocalProducts(u);}} style={{padding:"6px 8px",border:"1.5px solid #ddd",borderRadius:6,fontSize:12,background:"#fff",cursor:"pointer",fontWeight:600,color:"#1f5a8a"}}>
                  {MERCS.map(m=><option key={m} value={m}>{m}</option>)}
                </select>
                <button onClick={()=>setLocalProducts(localProducts.filter((_,j)=>j!==i))} style={{width:30,height:30,border:"1px solid #f0c0b8",borderRadius:6,background:"#fff8f6",cursor:"pointer",color:"#c04040",fontWeight:700,fontSize:16,lineHeight:1}}>×</button>
              </div>
            ))}
            {localProducts.length===0&&<div style={{padding:"20px",textAlign:"center",color:"#aaa",fontSize:13}}>Sin productos. Agrega uno abajo.</div>}
          </div>
          <div style={{border:"2px dashed #c8b8a8",borderRadius:8,padding:"12px",background:"#faf6f0",display:"flex",flexDirection:"column",gap:10}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:"#7a6a5a"}}>Agregar producto</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:8,alignItems:"center"}}>
              <input value={newNombre} onChange={e=>setNewNombre(e.target.value)} placeholder="Ej: CODERAS NOVASHOP" onKeyDown={e=>{if(e.key==="Enter"&&newNombre.trim()){setLocalProducts([...localProducts,{nombre:newNombre.trim().toUpperCase(),mercaderia:newMerc}]);setNewNombre("");}}} style={{padding:"9px 11px",border:"1.5px solid #ccc",borderRadius:8,fontSize:13,background:"#fff",color:"#1a1a1a",boxSizing:"border-box"}}/>
              <select value={newMerc} onChange={e=>setNewMerc(e.target.value)} style={{padding:"9px 8px",border:"1.5px solid #ccc",borderRadius:8,fontSize:13,background:"#fff",cursor:"pointer",fontWeight:600,color:"#1f5a8a"}}>
                {MERCS.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
            </div>
            <button onClick={()=>{if(!newNombre.trim())return;setLocalProducts([...localProducts,{nombre:newNombre.trim().toUpperCase(),mercaderia:newMerc}]);setNewNombre("");}} style={{padding:"9px",background:"#2f6b3b",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Agregar producto</button>
          </div>
          <div style={{padding:"8px 10px",background:"#f0f8ff",borderRadius:8,fontSize:12,color:"#1a4a7a",border:"1px solid #b0d0f0",lineHeight:1.6}}>
            💡 <strong>Categorías Shalom:</strong> XS = ropa/accesorios pequeños · S = telas/artículos medianos · M/L = paquetes grandes
          </div>
        </>}

        {tab==="estados"&&<>
          <div style={{padding:"10px 12px",background:"#f0f4ff",borderRadius:8,fontSize:13,color:"#1a3a6a",border:"1px solid #b0c8f0",lineHeight:1.6}}>
            👁 Define los estados del flujo de seguimiento (Nuevo, Interesado, Pagado…). El primero es el estado por defecto al crear un pedido.
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {localEstados.map((s,i)=>(<div key={i} style={{display:"grid",gridTemplateColumns:"auto 1fr auto auto auto",gap:6,alignItems:"center",padding:"6px 10px",border:"1.5px solid #e0d8cc",borderRadius:8,background:"#fff"}}>
              <span style={{width:14,height:14,borderRadius:"50%",background:colorForEstado(s),flexShrink:0}}/>
              <input value={s} onChange={e=>{const u=[...localEstados];u[i]=e.target.value;setLocalEstados(u);}} style={{padding:"6px 8px",border:"1.5px solid #ddd",borderRadius:6,fontSize:13,fontWeight:600,color:"#1c1a17",background:"#faf8f5",boxSizing:"border-box"}}/>

function SeguimientoCard({order,onClick,onDragStart,onDragEnd,dragging}){
  const precio=Number(order.precio||0),adelanto=Number(order.adelanto||0);
  const saldo=precio-adelanto;
  const llamadas=(Array.isArray(order.llamadas)?order.llamadas:[]).length;
  const ultimo=Array.isArray(order.llamadas)&&order.llamadas[0]?order.llamadas[0].ts:order.updated_at;
  const dias=daysSince(ultimo);
  const urgente=dias!==null&&dias>=3&&!["Entregado","Descartado"].includes(order.estado);
  return(<div draggable={!!onDragStart} onDragStart={onDragStart} onDragEnd={onDragEnd} onClick={onClick} style={{padding:"9px 11px",borderRadius:8,border:`1.5px solid ${urgente?"#f5b8b8":"#e0d8cc"}`,background:urgente?"#fff8f7":"#fff",cursor:onDragStart?"grab":"pointer",display:"flex",flexDirection:"column",gap:5,boxShadow:"0 1px 2px rgba(0,0,0,.04)",opacity:dragging?.4:1,transition:"opacity .12s"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
      <div style={{fontSize:13,fontWeight:700,color:"#1c1a17",lineHeight:1.25,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{order.nombres||"(sin nombre)"}</div>
      {precio>0&&<div style={{fontSize:11,fontWeight:700,fontFamily:"monospace",color:saldo>0?"#9b2020":"#166534",whiteSpace:"nowrap"}}>S/.{saldo.toFixed(0)}{precio>0&&saldo!==precio?`/${precio.toFixed(0)}`:""}</div>}
    </div>
    {order.celular&&<div style={{fontSize:11,color:"#7a6a5a",fontFamily:"monospace"}}>{order.celular}</div>}
    <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",fontSize:10}}>
      {llamadas>0&&<span style={{padding:"1px 6px",background:"#e8f4fd",border:"1px solid #b0d0f0",borderRadius:4,color:"#1a4a7a",fontWeight:700}}>📞×{llamadas}</span>}
      {order.clave_shalom&&<span style={{padding:"1px 6px",background:"#fff7ef",border:"1px solid #e8c880",borderRadius:4,color:"#7a4a00",fontWeight:700}}>📦{order.clave_shalom}</span>}
      {dias!==null&&<span style={{padding:"1px 6px",background:urgente?"#fef2f2":"#f5f0e8",border:`1px solid ${urgente?"#f5b8b8":"#d0c8bc"}`,borderRadius:4,color:urgente?"#9b2020":"#7a6a5a",fontWeight:600}}>{dias===0?"hoy":`${dias}d`}</span>}
    </div>
  </div>);
}

  const[dragId,setDragId]=useState(null);
  const[dragOver,setDragOver]=useState(null);
  const q=(segFilter.query||"").trim().toLowerCase();
  const filtered=useMemo(()=>orders.filter(o=>{
    if(!q)return true;
    return[o.nombres,o.celular,o.dni,o.destino,o.agencia,o.producto,o.clave_shalom].some(v=>String(v||"").toLowerCase().includes(q));
  }),[orders,q]);
  const byEstado=useMemo(()=>{const m={};estados.forEach(s=>m[s]=[]);filtered.forEach(o=>{const e=o.estado||estados[0];if(!m[e])m[e]=[];m[e].push(o);});return m;},[filtered,estados]);
  const commitQuery=()=>setSegFilter({...segFilter,query:queryDraft});
  const clearQuery=()=>{setQueryDraft("");setSegFilter({...segFilter,query:""});};
  const handleDrop=(estadoDestino)=>{
    if(dragId==null)return;
    const o=orders.find(x=>x.id===dragId);
    if(o&&o.estado!==estadoDestino)onChangeEstado&&onChangeEstado(o.id,estadoDestino);
    setDragId(null);setDragOver(null);
  };

  return(<div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0,overflow:"hidden",background:"#faf6f0"}}>
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 14px",borderBottom:"1px solid #d0c8bc",background:"#fdfaf6",flexShrink:0,flexWrap:"wrap"}}>
      <span style={{fontFamily:"monospace",fontSize:10,textTransform:"uppercase",letterSpacing:".1em",color:"#9a8070",fontWeight:700}}>Seguimiento · {filtered.length}</span>
      <div style={{flex:1,minWidth:140,display:"flex",gap:4,position:"relative"}}>
        <input value={queryDraft} onChange={e=>setQueryDraft(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")commitQuery();else if(e.key==="Escape")clearQuery();}} placeholder="🔍 nombre, celular, DNI… (Enter para buscar)" style={{width:"100%",padding:"7px 10px",paddingRight:queryDraft?60:10,border:"1.5px solid #d0c8bc",borderRadius:7,fontSize:12,background:"#fff",color:"#1a1a1a",boxSizing:"border-box"}}/>
        {queryDraft&&<button onClick={clearQuery} title="Limpiar" style={{position:"absolute",right:34,top:"50%",transform:"translateY(-50%)",border:"none",background:"transparent",cursor:"pointer",fontSize:14,color:"#888",lineHeight:1,padding:0,width:18,height:18}}>×</button>}
        <button onClick={commitQuery} title="Buscar (Enter)" style={{position:"absolute",right:3,top:"50%",transform:"translateY(-50%)",padding:"3px 8px",background:queryDraft!==(segFilter.query||"")?accent:"#d0c8bc",color:"#fff",border:"none",borderRadius:5,fontSize:11,cursor:"pointer",fontWeight:700}}>↵</button>
      </div>
      <div style={{display:"flex",border:"1.5px solid #c8b8a8",borderRadius:7,overflow:"hidden",background:"#fff"}}>
        {[["kanban","🗂"],["chips","🏷"],["tabs","📑"]].map(([v,ic])=>(<button key={v} onClick={()=>setSegView(v)} title={v} style={{padding:"5px 9px",fontSize:13,border:"none",background:segView===v?"#1c1a17":"transparent",color:segView===v?"#fff":"#6a5a4a",cursor:"pointer"}}>{ic}</button>))}
      </div>
    </div>
    {segView==="kanban"&&<div style={{flex:1,overflow:"auto",padding:"12px",display:"flex",gap:10,scrollSnapType:"x mandatory"}}>
      {estados.map(s=>{const items=byEstado[s]||[];const isOver=dragOver===s;return(<div key={s}
        onDragOver={e=>{e.preventDefault();if(dragOver!==s)setDragOver(s);}}
        onDragLeave={()=>{if(dragOver===s)setDragOver(null);}}
        onDrop={e=>{e.preventDefault();handleDrop(s);}}
        style={{minWidth:240,width:240,scrollSnapAlign:"start",background:isOver?"#fff7ef":"#f0ece5",borderRadius:10,border:`${isOver?2:1}px ${isOver?"dashed":"solid"} ${isOver?colorForEstado(s):"#d0c8bc"}`,display:"flex",flexDirection:"column",maxHeight:"100%",transition:"background .12s"}}>
        <div style={{padding:"8px 11px",borderBottom:`2px solid ${colorForEstado(s)}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:12,fontWeight:700,color:colorForEstado(s),textTransform:"uppercase",letterSpacing:".05em"}}>{s}</span>
          <span style={{fontSize:11,fontFamily:"monospace",color:"#7a6a5a",fontWeight:700}}>{items.length}</span>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"6px",display:"flex",flexDirection:"column",gap:6,minHeight:60}}>
          {items.length===0?<div style={{padding:"14px 8px",textAlign:"center",fontSize:11,color:isOver?colorForEstado(s):"#aaa",fontWeight:isOver?700:400}}>{isOver?"Soltar aquí ↓":"Vacío"}</div>:items.map(o=><SeguimientoCard key={o.id} order={o} onClick={()=>onOpen(o)} onDragStart={e=>{setDragId(o.id);try{e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",String(o.id));}catch{}}} onDragEnd={()=>{setDragId(null);setDragOver(null);}} dragging={dragId===o.id}/>)}
        </div>
      </div>);})}
    </div>}
    {(segView==="chips"||segView==="tabs")&&<>
      <div style={{padding:"8px 12px",borderBottom:"1px solid #e0d8cc",background:"#f5f0e8",display:"flex",gap:6,overflowX:"auto",flexShrink:0}}>
        <button onClick={()=>setSegFilter({...segFilter,estado:null})} style={{padding:"5px 11px",border:`1.5px solid ${!segFilter.estado?"#1c1a17":"#d0c8bc"}`,borderRadius:segView==="chips"?999:6,background:!segFilter.estado?"#1c1a17":"#fff",color:!segFilter.estado?"#fff":"#5a4a3a",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>Todos ({filtered.length})</button>
        {estados.map(s=>{const n=(byEstado[s]||[]).length;const active=segFilter.estado===s;return(<button key={s} onClick={()=>setSegFilter({...segFilter,estado:s})} style={{padding:"5px 11px",border:`1.5px solid ${active?colorForEstado(s):"#d0c8bc"}`,borderRadius:segView==="chips"?999:6,background:active?colorForEstado(s):"#fff",color:active?"#fff":colorForEstado(s),fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>{s} ({n})</button>);})}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 12px",display:"flex",flexDirection:"column",gap:6}}>
        {(segFilter.estado?(byEstado[segFilter.estado]||[]):filtered).map(o=><SeguimientoCard key={o.id} order={o} onClick={()=>onOpen(o)}/>)}
        {(segFilter.estado?(byEstado[segFilter.estado]||[]):filtered).length===0&&<div style={{padding:"28px",textAlign:"center",color:"#9a8a7a",fontSize:13}}><div style={{fontSize:30,marginBottom:8}}>📭</div>Sin clientes en este filtro.</div>}
      </div>
    </>}
  </div>);
}

function App(){
  const[cfg,setCfg]=useState(()=>({...DEFAULT_CFG,...(restore(SK.settings,{}))}));
  const[orders,setOrders]=useState(()=>restore(SK.orders,SAMPLE));
  const[tab,setTab]=useState("pegar");
  const[view,setView]=useState("input");
  const[page,setPage]=useState(1);
  const[editingOrder,setEditingOrder]=useState(null);
  const[showSettings,setShowSettings]=useState(false);
  const[showPrint,setShowPrint]=useState(false);
  const[showShalom,setShowShalom]=useState(false);
  const[logos,setLogos]=useState(()=>restore(SK.logos,[]));
  const[products,setProducts]=useState(()=>restore(SK.products,DEFAULT_PRODUCTS));
  const[syncCfg,setSyncCfg]=useState(()=>restore(SK.sync,DEFAULT_SYNC));
  const[syncStatus,setSyncStatus]=useState("off"); // off|syncing|ok|error
  const[lastSync,setLastSync]=useState(null);
  const[mode,setMode]=useState(()=>restore(SK.mode,"rotulador"));
  const[hiddenIds,setHiddenIds]=useState(()=>restore(SK.hidden,[]));
  const hiddenRef=useRef(hiddenIds);hiddenRef.current=hiddenIds;
  useEffect(()=>{persist(SK.hidden,hiddenIds);},[hiddenIds]);
  const[segView,setSegView]=useState(()=>restore(SK.segView,"kanban"));
  const[estados,setEstados]=useState(()=>restore(SK.estados,DEFAULT_ESTADOS));
  const[segFilter,setSegFilter]=useState({estado:null,query:""});
  const[seguimientoOrder,setSeguimientoOrder]=useState(null);
  useEffect(()=>{persist(SK.mode,mode);},[mode]);
  useEffect(()=>{persist(SK.segView,segView);},[segView]);
  useEffect(()=>{persist(SK.estados,estados);},[estados]);
  const syncRef=useRef(syncCfg);
  syncRef.current=syncCfg;
  const[winW,setWinW]=useState(window.innerWidth);
  useEffect(()=>{const h=()=>setWinW(window.innerWidth);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  useEffect(()=>{persist(SK.settings,cfg);},[cfg]);
  useEffect(()=>{persist(SK.orders,orders);},[orders]);
  useEffect(()=>{persist(SK.products,products);},[products]);
  useEffect(()=>{persist(SK.sync,syncCfg);},[syncCfg]);
  const isMobile=winW<640;const isTablet=winW>=640&&winW<1024;const isDesktop=winW>=1024;
  const totalPages=Math.max(1,Math.ceil(orders.length/PER_PAGE));
  const pageOrders=useMemo(()=>orders.slice((page-1)*PER_PAGE,page*PER_PAGE),[orders,page]);
  useEffect(()=>{if(page>totalPages)setPage(totalPages);},[totalPages]);
  const logoUrl=useMemo(()=>{if(!cfg.activeLogo)return null;const l=logos.find(l=>l.id===cfg.activeLogo);return l?l.dataUrl:null;},[cfg.activeLogo,logos]);

  const[syncMsg,setSyncMsg]=useState("");
  const doSync=async()=>{
    const c=syncRef.current;
    if(!c.enabled||!c.url||!c.key){setSyncStatus("off");return;}
    setSyncStatus("syncing");setSyncMsg("");
    try{
      const cloudData=await cloudPull(c);
      const hide=new Set((hiddenRef.current||[]).map(Number));
      const cloudById=new Map(cloudData.map(o=>[Number(o.id),{...o,id:Number(o.id)}]));
      let schemaWarn=false;
      setOrders(prev=>{
        const localById=new Map(prev.map(o=>[Number(o.id),o]));
        const allIds=new Set([...localById.keys(),...cloudById.keys()]);
        const merged=[];
        const toUpload=[];
        for(const id of allIds){
          if(hide.has(id))continue;
          const l=localById.get(id),r=cloudById.get(id);
          if(l&&r){
            const lt=new Date(l.updated_at||0).getTime();
            const rt=new Date(r.updated_at||0).getTime();
            if(lt>rt){merged.push(l);toUpload.push(l);}else merged.push({...l,...r});
          }else if(l){merged.push(l);toUpload.push(l);}
          else merged.push(r);
        }
        // Fire-and-forget re-subida de los que solo existen en local o tienen versión más nueva
        toUpload.forEach(o=>cloudUpsert(c,{...o,id:Number(o.id)}).catch(e=>{if(e&&e.fallback)schemaWarn=true;}));
        return merged.sort((a,b)=>Number(a.id)-Number(b.id));
      });
      setSyncStatus("ok");setLastSync(new Date());
      if(schemaWarn)setSyncMsg("⚠ Tu tabla de Supabase no tiene las columnas del modo Seguimiento. Se guardaron solo los campos básicos. Corre el ALTER TABLE en Configuración → Sync.");
    }catch(e){setSyncStatus("error");setSyncMsg(String(e&&e.message||e));}
  };
  useEffect(()=>{
    if(!syncCfg.enabled){setSyncStatus("off");return;}
    doSync();
    const t=setInterval(doSync,60000);
    return()=>clearInterval(t);
  },[syncCfg.enabled,syncCfg.url,syncCfg.key]);

  const pushToCloud=(o)=>{
    const c=syncRef.current;
    if(!c.enabled||!c.url||!c.key)return;
    cloudUpsert(c,{...o,id:Number(o.id)}).then(()=>{setSyncStatus("ok");setSyncMsg("");}).catch(e=>{
      if(e&&e.fallback){setSyncStatus("ok");setSyncMsg("⚠ Faltan columnas en Supabase — guardado solo con campos básicos. Corre el ALTER TABLE.");}
      else{setSyncStatus("error");setSyncMsg(String(e&&e.message||e));}
    });
  };
  const addOrder=o=>{
    const enriched={estado:estados[0]||"Nuevo",updated_at:new Date().toISOString(),...o};
    setOrders(p=>[...p,enriched]);
    if(isMobile||isTablet)setView("list");
    pushToCloud(enriched);
  };
  const removeOrder=id=>{
    setOrders(p=>p.filter(x=>x.id!==id));
    setHiddenIds(p=>p.includes(Number(id))?p:[...p,Number(id)]);
  };
  const saveOrder=o=>{
    const stamped={...o,updated_at:new Date().toISOString()};
    setOrders(p=>p.map(x=>x.id===o.id?stamped:x));
    pushToCloud(stamped);
  };
  const A=cfg.accent;
  const TabBtn=(id,label)=><button onClick={()=>setTab(id)} style={{flex:1,padding:"9px 8px",borderRadius:7,fontSize:isMobile?12:13,fontWeight:tab===id?700:500,color:tab===id?"#fff":"#6a5a4a",background:tab===id?A:"transparent",border:"none",cursor:"pointer",transition:".12s",whiteSpace:"nowrap"}}>{label}</button>;

  const ModeToggle=()=>(<div style={{display:"inline-flex",position:"relative",background:"#ede8e0",border:"1.5px solid #d0c8bc",borderRadius:999,padding:3,cursor:"pointer",userSelect:"none"}} onClick={()=>setMode(mode==="rotulador"?"seguimiento":"rotulador")}>
    <div style={{position:"absolute",top:3,left:mode==="rotulador"?3:"50%",width:"calc(50% - 3px)",height:"calc(100% - 6px)",background:A,borderRadius:999,transition:".18s ease",boxShadow:"0 1px 3px rgba(0,0,0,.15)"}}/>
    <div style={{position:"relative",zIndex:1,padding:isMobile?"5px 11px":"5px 14px",fontSize:isMobile?11:12,fontWeight:700,color:mode==="rotulador"?"#fff":"#7a6a5a",letterSpacing:".02em",transition:".18s"}}>📋 Rotulador</div>
    <div style={{position:"relative",zIndex:1,padding:isMobile?"5px 11px":"5px 14px",fontSize:isMobile?11:12,fontWeight:700,color:mode==="seguimiento"?"#fff":"#7a6a5a",letterSpacing:".02em",transition:".18s"}}>👁 Seguimiento</div>
  </div>);

  const MobileNav=()=>{
    const buttons=mode==="rotulador"

      : [["kanban","🗂","Kanban",()=>setSegView("kanban")],["chips","🏷","Chips",()=>setSegView("chips")],["tabs","📑","Tabs",()=>setSegView("tabs")],["__sn","🧾","SUNAT",()=>exportarFormatoSunat(orders)],["__cf","⚙","Config",()=>setShowSettings(true)]];

    <div style={{display:"flex",alignItems:"center",gap:7,fontWeight:800,fontSize:isMobile?14:17,letterSpacing:"-.03em",color:"#1c1a17"}}>
      <div style={{width:9,height:9,borderRadius:2,background:A}}/>rotulado{!isMobile&&<span style={{fontFamily:"monospace",fontWeight:400,color:"#9a8a7a",fontSize:10}}>generador A4</span>}

  </div>);

          </div>

        </div>
        <div style={{display:"flex",gap:3,flexShrink:0}}>
          <button onClick={e=>{e.stopPropagation();setEditingOrder(o);}} style={{width:28,height:28,borderRadius:6,border:"1px solid #d0c8bc",background:"#fff",cursor:"pointer",fontSize:14,color:"#6a5a4a"}} title="Editar">✎</button>
          <button onClick={e=>{e.stopPropagation();removeOrder(o.id);}} style={{width:28,height:28,borderRadius:6,border:"1px solid #f0c0b8",background:"#fff8f6",cursor:"pointer",fontSize:15,color:"#c04040",fontWeight:700}} title="Eliminar">×</button>
        </div>
      </div>);})}
    </div>
  </div>);};

  const PreviewPanel=()=>(<div style={{display:"flex",flexDirection:"column",overflow:"hidden",flex:1}}>
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 16px",borderBottom:"2px solid #d0c8bc",background:"#fdfaf6",flexShrink:0,flexWrap:"wrap"}}>
      <span style={{fontFamily:"monospace",fontSize:9.5,textTransform:"uppercase",letterSpacing:".1em",color:"#9a8070",fontWeight:700}}>Vista previa</span>
      <div style={{display:"flex",border:"1.5px solid #c8b8a8",borderRadius:7,overflow:"hidden",background:"#fff"}}>
        {Array.from({length:totalPages},(_,i)=>i+1).map(p=><button key={p} onClick={()=>setPage(p)} style={{padding:"4px 10px",fontSize:12,border:"none",background:page===p?"#1c1a17":"transparent",color:page===p?"#fff":"#6a5a4a",cursor:"pointer",fontWeight:page===p?700:500}}>H{p}</button>)}
      </div>
      <div style={{flex:1}}/>
      <button onClick={()=>setShowShalom(true)} style={{padding:"6px 12px",background:"#d4820a",color:"#fff",border:"none",borderRadius:7,fontSize:12,cursor:"pointer",fontWeight:700}}>📦 Shalom</button>
      <button onClick={()=>setShowPrint(true)} style={{padding:"6px 12px",background:A,color:"#fff",border:"none",borderRadius:7,fontSize:12,cursor:"pointer",fontWeight:700}}>🖨 PDF</button>
    </div>
    <div style={{flex:1,overflow:"auto",display:"flex",justifyContent:"center",alignItems:"flex-start",padding:"20px 12px",background:"#e0dbd0"}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10,width:"100%",maxWidth:600}}>
        <div style={{background:"#fff",width:"100%",maxWidth:570,display:"grid",gridTemplateColumns:"1fr 1fr",boxShadow:"0 2px 8px rgba(0,0,0,.08),0 20px 50px -15px rgba(0,0,0,.2)",padding:isMobile?4:8,border:"1px solid #ddd"}}>
          {[0,1,2,3,4,5].map(i=><LabelCard key={i} order={pageOrders[i]||null} idx={i} cfg={cfg} logoUrl={logoUrl}/>)}
        </div>
        <div style={{fontFamily:"monospace",fontSize:10,color:"#8a7a6a",textTransform:"uppercase",letterSpacing:".07em"}}>A4 · 210×297 mm</div>
      </div>
    </div>
  </div>);

  const Modals=()=>(<>
    {editingOrder&&<EditModal order={editingOrder} onSave={o=>{saveOrder(o);setEditingOrder(null);}} onClose={()=>setEditingOrder(null)} cfg={cfg} products={products}/>}
    {seguimientoOrder&&<SeguimientoModal order={seguimientoOrder} estados={estados} onSave={o=>{saveOrder(o);setSeguimientoOrder(null);}} onClose={()=>setSeguimientoOrder(null)}/>}
    {showSettings&&<SettingsModal cfg={cfg} setCfg={setCfg} logos={logos} setLogos={setLogos} products={products} setProducts={setProducts} syncCfg={syncCfg} setSyncCfg={setSyncCfg} doSync={doSync} syncStatus={syncStatus} estados={estados} setEstados={setEstados} hiddenIds={hiddenIds} setHiddenIds={setHiddenIds} onClose={()=>setShowSettings(false)}/>}
    {showPrint&&<PrintModal orders={orders} page={page} totalPages={totalPages} cfg={cfg} logoUrl={logoUrl} onClose={()=>setShowPrint(false)}/>}
    {showShalom&&<ShalomModal orders={orders} totalPages={totalPages} products={products} onClose={()=>setShowShalom(false)}/>}
  </>);

  const changeEstado=(id,estado)=>{const o=orders.find(x=>x.id===id);if(!o)return;saveOrder({...o,estado,updated_at:new Date().toISOString()});};
  const SegPanel=()=>(<SeguimientoView orders={orders} estados={estados} segView={segView} setSegView={setSegView} segFilter={segFilter} setSegFilter={setSegFilter} onOpen={setSeguimientoOrder} onChangeEstado={changeEstado} accent={A}/>);

  if(isDesktop)return(<div style={{fontFamily:"Inter,system-ui,sans-serif",minHeight:"100vh",display:"flex",flexDirection:"column",background:"#e8e2d8"}}>
    {TopBar()}
    {mode==="rotulador"?<div style={{flex:1,display:"grid",gridTemplateColumns:"390px 1fr",minHeight:0,overflow:"hidden"}}>
      <div style={{borderRight:"2px solid #d0c8bc",display:"flex",flexDirection:"column",overflow:"hidden",background:"#faf6f0"}}>
        <div style={{overflowY:"auto",maxHeight:"58%",background:"#fdfaf6",borderBottom:"2px solid #d0c8bc"}}>{InputPanel()}</div>
        {ListPanel()}
      </div>
      {PreviewPanel()}
    </div>:<div style={{flex:1,minHeight:0,overflow:"hidden",display:"flex"}}>{SegPanel()}</div>}
    {Modals()}
  </div>);

  if(isTablet)return(<div style={{fontFamily:"Inter,system-ui,sans-serif",minHeight:"100vh",display:"flex",flexDirection:"column",background:"#e8e2d8"}}>
    {TopBar()}
    {mode==="rotulador"?<div style={{flex:1,display:"grid",gridTemplateColumns:"310px 1fr",minHeight:0,overflow:"hidden"}}>
      <div style={{borderRight:"2px solid #d0c8bc",display:"flex",flexDirection:"column",overflow:"hidden",background:"#faf6f0"}}>
        <div style={{display:"flex",borderBottom:"1px solid #d0c8bc",background:"#f5f0e8",flexShrink:0}}>
          {[["input","➕ Nuevo"],["list","📦 "+orders.length]].map(([v,l])=><button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"9px",border:"none",borderBottom:`3px solid ${view===v?A:"transparent"}`,background:"transparent",fontSize:12,fontWeight:view===v?700:500,color:view===v?A:"#7a6a5a",cursor:"pointer"}}>{l}</button>)}
        </div>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>{view==="input"?InputPanel():ListPanel()}</div>
      </div>
      {PreviewPanel()}
    </div>:<div style={{flex:1,minHeight:0,overflow:"hidden",display:"flex"}}>{SegPanel()}</div>}
    {Modals()}
  </div>);

  return(<div style={{fontFamily:"Inter,system-ui,sans-serif",minHeight:"100vh",display:"flex",flexDirection:"column",background:"#faf6f0",paddingBottom:65}}>
    {TopBar()}
    {mode==="rotulador"?<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
      {view==="input"&&<div style={{flex:1,overflowY:"auto"}}>{InputPanel()}</div>}
      {view==="list"&&<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",background:"#faf6f0"}}>{ListPanel()}</div>}
      {view==="preview"&&<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>{PreviewPanel()}</div>}
    </div>:<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>{SegPanel()}</div>}
    {MobileNav()}{Modals()}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
