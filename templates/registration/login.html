{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'core/css/login.css' %}">
</head>
<body>

<div class="left">
  <div class="brand-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <path d="M14 17.5h7M17.5 14v7"/>
      </svg>
    </div>
    <span class="brand-name">Dashboard</span>
  </div>
  <div class="left-headline">
    <h1>Tu ERP,<br>más <span class="accent">inteligente</span><br>que nunca.</h1>
    <p>Gestiona tu empresa en un solo lugar.</p>
  </div>
</div>

<div class="right">
  <form class="form-card" method="post">
    {% csrf_token %}
    <div class="form-header">
      <h2>Bienvenido de vuelta</h2>
      <p>Ingresa tus credenciales para continuar</p>
    </div>

    {% if error %}
    <div class="server-error">{{ error }}</div>
    {% endif %}

    <div class="field">
      <input type="text" name="username" id="id_username" placeholder=" " autofocus>
      <label for="id_username">Usuario</label>
    </div>

    <div class="field">
      <input type="password" name="password" id="id_password" placeholder=" ">
      <label for="id_password">Contraseña</label>
    </div>

    <button type="submit" class="btn-login">Iniciar sesión</button>

    <div class="footer-note">Dashboard v1.0 · © 2026</div>
  </form>
</div>

</body>
</html>
